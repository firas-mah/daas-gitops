apiVersion: apps/v1
kind: Deployment
metadata:
  name: mono2-back
  namespace: mono2
  labels:
    app: mono2-back
    app.kubernetes.io/part-of: mono2
    app.kubernetes.io/component: back
    managed-by: daas
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mono2-back
      app.kubernetes.io/part-of: mono2
      app.kubernetes.io/component: back
  template:
    metadata:
      labels:
        app: mono2-back
        app.kubernetes.io/part-of: mono2
        app.kubernetes.io/component: back
    spec:
      containers:
        - name: back
          image: docker.io/firasmah/mono2-back:run-1775331074857-back
          ports:
            - containerPort: 8081
              protocol: TCP
          envFrom:
            - secretRef:
                name: mono2-back-secrets
                optional: true
            - configMapRef:
                name: mono2-back-config
                optional: true
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
          readinessProbe:
            tcpSocket:
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: 8081
            initialDelaySeconds: 90
            periodSeconds: 10
            failureThreshold: 3
