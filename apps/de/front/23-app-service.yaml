apiVersion: v1
kind: Service
metadata:
  name: de-front
  namespace: de
  labels:
    app: de-front
    app.kubernetes.io/part-of: de
    app.kubernetes.io/component: front
    managed-by: daas
spec:
  type: ClusterIP
  selector:
    app: de-front
    app.kubernetes.io/part-of: de
    app.kubernetes.io/component: front
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
