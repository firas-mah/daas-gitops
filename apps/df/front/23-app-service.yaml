apiVersion: v1
kind: Service
metadata:
  name: df-front
  namespace: df
  labels:
    app: df-front
    app.kubernetes.io/part-of: df
    app.kubernetes.io/component: front
    managed-by: daas
spec:
  type: ClusterIP
  selector:
    app: df-front
    app.kubernetes.io/part-of: df
    app.kubernetes.io/component: front
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
