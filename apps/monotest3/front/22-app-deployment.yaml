apiVersion: apps/v1
kind: Deployment
metadata:
  name: monotest3-front
  namespace: monotest3
  labels:
    app: monotest3-front
    app.kubernetes.io/part-of: monotest3
    app.kubernetes.io/component: front
    managed-by: daas
spec:
  replicas: 1
  selector:
    matchLabels:
      app: monotest3-front
      app.kubernetes.io/part-of: monotest3
      app.kubernetes.io/component: front
  template:
    metadata:
      labels:
        app: monotest3-front
        app.kubernetes.io/part-of: monotest3
        app.kubernetes.io/component: front
    spec:
      containers:
        - name: front
          image: docker.io/firasmah/monotest3-front:run-1774870530636-front
          ports:
            - containerPort: 80
              protocol: TCP
          envFrom:
            - secretRef:
                name: monotest3-front-secrets
                optional: true
            - configMapRef:
                name: monotest3-front-config
                optional: true
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
          readinessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 90
            periodSeconds: 10
            failureThreshold: 3
