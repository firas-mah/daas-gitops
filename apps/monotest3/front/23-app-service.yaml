apiVersion: v1
kind: Service
metadata:
  name: monotest3-front
  namespace: monotest3
  labels:
    app: monotest3-front
    app.kubernetes.io/part-of: monotest3
    app.kubernetes.io/component: front
    managed-by: daas
spec:
  type: ClusterIP
  selector:
    app: monotest3-front
    app.kubernetes.io/part-of: monotest3
    app.kubernetes.io/component: front
  ports:
    - name: http
      port: 8080
      targetPort: 80
      protocol: TCP
