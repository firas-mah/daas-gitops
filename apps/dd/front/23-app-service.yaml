apiVersion: v1
kind: Service
metadata:
  name: dd-front
  namespace: dd
  labels:
    app: dd-front
    app.kubernetes.io/part-of: dd
    app.kubernetes.io/component: front
    managed-by: daas
spec:
  type: ClusterIP
  selector:
    app: dd-front
    app.kubernetes.io/part-of: dd
    app.kubernetes.io/component: front
  ports:
    - name: http
      port: 8080
      targetPort: 80
      protocol: TCP
