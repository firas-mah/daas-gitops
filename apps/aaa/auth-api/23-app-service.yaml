apiVersion: v1
kind: Service
metadata:
  name: aaa-auth-api
  namespace: aaa
  labels:
    app: aaa-auth-api
    app.kubernetes.io/part-of: aaa
    app.kubernetes.io/component: auth-api
    managed-by: daas
spec:
