apiVersion: apps/v1
kind: Deployment
metadata:
  name: aaa-auth-api
  namespace: aaa
  labels:
    app: aaa-auth-api
    app.kubernetes.io/part-of: aaa
    app.kubernetes.io/component: auth-api
    managed-by: daas
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aaa-auth-api
      app.kubernetes.io/part-of: aaa
      app.kubernetes.io/component: auth-api
  template:
    metadata:
      labels:
        app: aaa-auth-api
        app.kubernetes.io/part-of: aaa
        app.kubernetes.io/component: auth-api
    spec:
      containers:
        - name: auth-api
          image: docker.io/firasmah/aaa-auth-api:run-1776638981589-auth-api
          ports:
            - containerPort: 8081
              protocol: TCP
          envFrom:
            - secretRef:
                name: aaa-auth-api-secrets
                optional: true
            - configMapRef:
                name: aaa-auth-api-config
                optional: true
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
          readinessProbe:
            tcpSocket:
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: 8081
            initialDelaySeconds: 90
            periodSeconds: 10
            failureThreshold: 3
