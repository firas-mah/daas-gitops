apiVersion: v1
kind: Service
metadata:
  name: aaa-frontend
  namespace: aaa
  labels:
    app: aaa-frontend
    app.kubernetes.io/part-of: aaa
    app.kubernetes.io/component: frontend
    managed-by: daas
spec:
  type: ClusterIP
  selector:
    app: aaa-frontend
    app.kubernetes.io/part-of: aaa
    app.kubernetes.io/component: frontend
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
