apiVersion: v1
kind: Service
metadata:
  name: zeee-front
  namespace: zeee
  labels:
    app: zeee-front
    app.kubernetes.io/part-of: zeee
    app.kubernetes.io/component: front
    managed-by: daas
spec:
  type: ClusterIP
  selector:
    app: zeee-front
    app.kubernetes.io/part-of: zeee
    app.kubernetes.io/component: front
  ports:
    - name: http
      port: 8080
      targetPort: 80
      protocol: TCP
