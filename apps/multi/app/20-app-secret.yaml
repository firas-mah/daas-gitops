apiVersion: v1
kind: Secret
metadata:
  name: multi-app-secrets
  namespace: multi
type: Opaque
stringData:
  JWT_SECRET: "multi-jwt-secret"
  SPRING_DATA_MONGODB_URI: "mongodb://admin:multi-mongodb-pass@mongodb:27017/appdb?authSource=admin"
  MONGODB_URI: "mongodb://admin:multi-mongodb-pass@mongodb:27017/appdb?authSource=admin"
