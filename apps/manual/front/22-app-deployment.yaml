apiVersion: apps/v1
kind: Deployment
metadata:
  name: manual-front
  namespace: manual
  labels:
    app: manual-front
    app.kubernetes.io/part-of: manual
    app.kubernetes.io/component: front
    managed-by: daas
spec:
  replicas: 1
  selector:
    matchLabels:
      app: manual-front
      app.kubernetes.io/part-of: manual
      app.kubernetes.io/component: front
  template:
    metadata:
      labels:
        app: manual-front
        app.kubernetes.io/part-of: manual
        app.kubernetes.io/component: front
    spec:
      containers:
        - name: front
          image: docker.io/firasmah/manual-front:push-1776352561835-front
          ports:
            - containerPort: 80
              protocol: TCP
          envFrom:
            - secretRef:
                name: manual-front-secrets
                optional: true
            - configMapRef:
                name: manual-front-config
                optional: true
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
          readinessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 90
            periodSeconds: 10
            failureThreshold: 3
