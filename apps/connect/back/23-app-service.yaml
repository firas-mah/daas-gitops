apiVersion: v1
kind: Service
metadata:
  name: connect-back
  namespace: connect
  labels:
    app: connect-back
    app.kubernetes.io/part-of: connect
    app.kubernetes.io/component: back
    managed-by: daas
spec:
  type: ClusterIP
  selector:
    app: connect-back
    app.kubernetes.io/part-of: connect
    app.kubernetes.io/component: back
  ports:
    - name: http
      port: 8080
      targetPort: 8081
      protocol: TCP
