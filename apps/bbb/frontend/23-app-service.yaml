apiVersion: v1
kind: Service
metadata:
  name: bbb-frontend
  namespace: bbb
  labels:
    app: bbb-frontend
    app.kubernetes.io/part-of: bbb
    app.kubernetes.io/component: frontend
    managed-by: daas
spec:
  type: ClusterIP
  selector:
    app: bbb-frontend
    app.kubernetes.io/part-of: bbb
    app.kubernetes.io/component: frontend
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
