apiVersion: v1
kind: Service
metadata:
  name: microservice-app-frontend
  namespace: microservice-app
  labels:
    app: microservice-app-frontend
    app.kubernetes.io/part-of: microservice-app
    app.kubernetes.io/component: frontend
    managed-by: daas
spec:
  type: ClusterIP
  selector:
    app: microservice-app-frontend
    app.kubernetes.io/part-of: microservice-app
    app.kubernetes.io/component: frontend
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
