apiVersion: v1
kind: Service
metadata:
  name: mono-front
  namespace: mono
  labels:
    app: mono-front
    app.kubernetes.io/part-of: mono
    app.kubernetes.io/component: front
    managed-by: daas
spec:
  type: ClusterIP
  selector:
    app: mono-front
    app.kubernetes.io/part-of: mono
    app.kubernetes.io/component: front
  ports:
    - name: http
      port: 8080
      targetPort: 80
      protocol: TCP
