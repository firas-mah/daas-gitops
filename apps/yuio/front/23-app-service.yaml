apiVersion: v1
kind: Service
metadata:
  name: yuio-front
  namespace: yuio
  labels:
    app: yuio-front
    app.kubernetes.io/part-of: yuio
    app.kubernetes.io/component: front
    managed-by: daas
spec:
  type: ClusterIP
  selector:
    app: yuio-front
    app.kubernetes.io/part-of: yuio
    app.kubernetes.io/component: front
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
