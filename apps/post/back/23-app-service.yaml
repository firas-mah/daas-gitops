apiVersion: v1
kind: Service
metadata:
  name: post-back
  namespace: post
  labels:
    app: post-back
    app.kubernetes.io/part-of: post
    app.kubernetes.io/component: back
    managed-by: daas
spec:
  type: ClusterIP
  selector:
    app: post-back
    app.kubernetes.io/part-of: post
    app.kubernetes.io/component: back
  ports:
    - name: http
      port: 8080
      targetPort: 8081
      protocol: TCP
