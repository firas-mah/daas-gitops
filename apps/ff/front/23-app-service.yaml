apiVersion: v1
kind: Service
metadata:
  name: ff-front
  namespace: ff
  labels:
    app: ff-front
    app.kubernetes.io/part-of: ff
    app.kubernetes.io/component: front
    managed-by: daas
spec:
  type: ClusterIP
  selector:
    app: ff-front
    app.kubernetes.io/part-of: ff
    app.kubernetes.io/component: front
  ports:
    - name: http
      port: 8080
      targetPort: 80
      protocol: TCP
