apiVersion: apps/v1
kind: Deployment
metadata:
  name: ff-front
  namespace: ff
  labels:
    app: ff-front
    app.kubernetes.io/part-of: ff
    app.kubernetes.io/component: front
    managed-by: daas
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ff-front
      app.kubernetes.io/part-of: ff
      app.kubernetes.io/component: front
  template:
    metadata:
      labels:
        app: ff-front
        app.kubernetes.io/part-of: ff
        app.kubernetes.io/component: front
    spec:
      containers:
        - name: front
          image: docker.io/firasmah/ff-front:run-1776272697478-front
          ports:
            - containerPort: 80
              protocol: TCP
          envFrom:
            - secretRef:
                name: ff-front-secrets
                optional: true
            - configMapRef:
                name: ff-front-config
                optional: true
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
          readinessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 90
            periodSeconds: 10
            failureThreshold: 3
