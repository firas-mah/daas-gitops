apiVersion: apps/v1
kind: Deployment
metadata:
  name: webhook-back
  namespace: webhook
  labels:
    app: webhook-back
    app.kubernetes.io/part-of: webhook
    app.kubernetes.io/component: back
    managed-by: daas
spec:
  replicas: 1
  selector:
    matchLabels:
      app: webhook-back
      app.kubernetes.io/part-of: webhook
      app.kubernetes.io/component: back
  template:
    metadata:
      labels:
        app: webhook-back
        app.kubernetes.io/part-of: webhook
        app.kubernetes.io/component: back
    spec:
      containers:
        - name: back
          image: docker.io/firasmah/webhook-back:run-1775910981574-back
          ports:
            - containerPort: 8081
              protocol: TCP
          envFrom:
            - secretRef:
                name: webhook-back-secrets
                optional: true
            - configMapRef:
                name: webhook-back-config
                optional: true
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
          readinessProbe:
            tcpSocket:
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: 8081
            initialDelaySeconds: 90
            periodSeconds: 10
            failureThreshold: 3
