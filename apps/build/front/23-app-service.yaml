apiVersion: v1
kind: Service
metadata:
  name: build-front
  namespace: build
  labels:
    app: build-front
    app.kubernetes.io/part-of: build
    app.kubernetes.io/component: front
    managed-by: daas
spec:
  type: ClusterIP
  selector:
    app: build-front
    app.kubernetes.io/part-of: build
    app.kubernetes.io/component: front
  ports:
    - name: http
      port: 8080
      targetPort: 80
      protocol: TCP
