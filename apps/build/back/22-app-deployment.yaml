apiVersion: apps/v1
kind: Deployment
metadata:
  name: build-back
  namespace: build
  labels:
    app: build-back
    app.kubernetes.io/part-of: build
    app.kubernetes.io/component: back
    managed-by: daas
spec:
  replicas: 1
  selector:
    matchLabels:
      app: build-back
      app.kubernetes.io/part-of: build
      app.kubernetes.io/component: back
  template:
    metadata:
      labels:
        app: build-back
        app.kubernetes.io/part-of: build
        app.kubernetes.io/component: back
    spec:
      containers:
        - name: back
          image: docker.io/firasmah/build-back:run-1775073444183-back
          ports:
            - containerPort: 8081
              protocol: TCP
          envFrom:
            - secretRef:
                name: build-back-secrets
                optional: true
            - configMapRef:
                name: build-back-config
                optional: true
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
          readinessProbe:
            tcpSocket:
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: 8081
            initialDelaySeconds: 90
            periodSeconds: 10
            failureThreshold: 3
